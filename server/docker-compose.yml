services:
  app:
    build: .
    restart: always
    ports:
      - "3001:3001"
    env_file: .env
    environment:
      - NODE_ENV=production

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/letsencrypt
      - ./certbot-www:/var/www/certbot
    depends_on:
      - app
