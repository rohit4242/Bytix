name: Deploy Bytix Server to EC2

on:
  push:
    branches: [ "main" ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Build and push Docker image
      # Replace with your own registry (ECR / GHCR)
      run: |
        docker build -t bytix-server:latest .
        # docker tag bytix-server:latest <your-account-id>.dkr.ecr.<region>.amazonaws.com/bytix-server:latest
        # docker push <your-account-id>.dkr.ecr.<region>.amazonaws.com/bytix-server:latest

    - name: Deploy to EC2 via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          cd ~/bytix-server
          # Ensure docker-compose.yml and nginx.conf are present
          # For now, assuming they are pushed or copied
          docker compose pull
          docker compose up -d
